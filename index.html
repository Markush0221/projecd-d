<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT D | Official Web Site</title>
    <style>
        /* Основные стили Project D */
        html {
            scroll-behavior: smooth; /* Плавная прокрутка */
        }
        
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            text-transform: uppercase;
        }

        header {
            border-bottom: 4px solid #ffcc00;
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, #0b0b0b);
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            color: #ffcc00;
            margin: 0;
            text-shadow: 2px 2px #000;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #888;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: #111;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffcc00;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .card-grid {
            display: grid;
            /* Исправленная сетка: карточки будут широкими и адаптивными */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px;
        }

        .car-card {
            border-left: 5px solid #ffcc00;
            background: #1a1a1a;
            padding: 20px;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            transform: skewX(-2deg) scale(1.02);
            background: #222;
        }

        h2 {
            color: #ffcc00;
            margin-top: 0;
        }

        .spec-list {
            list-style: none;
            padding: 0;
            font-size: 0.9rem;
            color: #bbb;
        }

        .spec-list li {
            margin-bottom: 5px;
            border-bottom: 1px solid #333;
        }
    
        /* Стили для всплывающего окна */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            background-color: #1a1a1a;
            margin: 10% auto;
            padding: 30px;
            border: 2px solid #ffcc00;
            width: 85%;
            max-width: 500px;
            color: white;
            border-radius: 10px;
            position: relative;
            text-transform: none;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            color: #ffcc00;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-info h2 { 
            color: #ffcc00; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px;
            margin-top: 0;
        }
